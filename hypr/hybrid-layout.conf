# -- Layout --------------------------------------------------------------
# Only overrides not present in ~/.local/share/caelestia/
dwindle {
    pseudotile = true
}

general {
    resize_on_border = true
}

# -- Float Rules ---------------------------------------------------------
windowrule = float true, match:class nm-connection-editor
windowrule = size 60% 65%, match:class nm-connection-editor
windowrule = center 1, match:class nm-connection-editor

windowrule = float true, match:class org.gnome.Calculator
windowrule = size 380 600, match:class org.gnome.Calculator
windowrule = center 1, match:class org.gnome.Calculator

windowrule = float true, match:class xdg-desktop-portal-gtk
windowrule = size 70% 75%, match:class xdg-desktop-portal-gtk
windowrule = center 1, match:class xdg-desktop-portal-gtk

# mpv -- float all non-PiP windows (PiP handled by caelestia)
windowrule = float true, match:class mpv, match:title ^((?!Picture).)*$
windowrule = size 70% 70%, match:class mpv, match:title ^((?!Picture).)*$
windowrule = center 1, match:class mpv, match:title ^((?!Picture).)*$

windowrule = float true, match:title ^Confirm
windowrule = float true, match:title ^(Error|Warning|Alert)

# -- Keybinds ------------------------------------------------------------
# Super+F/T/C/E etc. are taken by caelestia -- use Super+Shift prefix here
bind = Super+Shift, F, pseudo        # pseudotile toggle (keep in grid, free resize)
bind = Super+Shift, V, togglesplit   # toggle dwindle split direction
bind = Super+Shift, Return, layoutmsg, swapwithmaster
