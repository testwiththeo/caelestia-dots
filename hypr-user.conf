# ── Source ──────────────────────────────────────────────────────
source = ~/.config/caelestia/hypr/hybrid-layout.conf

# ── Hyprexpo (Mission Control overview) ─────────────────────────
# managed by hyprpm — do NOT add plugin = line here
plugin {
    hyprexpo {
        columns = 3
        gap_size = 10
        bg_col = rgb(1a1a1a)
        workspace_method = center current
    }
}

# ── Cursor ───────────────────────────────────────────────────────
exec-once = hyprctl setcursor Bibata-Modern-Ice 32
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,32

# ── NVIDIA Hybrid GPU ────────────────────────────────────────────
# card1=NVIDIA RTX 3050, card2=Intel UHD
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card2
cursor {
    no_hardware_cursors = true
}

# ── Theming ──────────────────────────────────────────────────────
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'

# ── Services ─────────────────────────────────────────────────────
exec-once = kdeconnectd

# ── Display ──────────────────────────────────────────────────────
misc {
    vrr = 0    # disabled — prevents flickering on eDP-1
    vfr = true
}

# Inactive window dim
decoration {
    dim_inactive = true
    dim_strength = 0.15
}

# Multi-monitor (uncomment when connecting external)
# monitor = eDP-1, 1920x1080@144, 0x0, 1
# monitor = HDMI-A-1, 1920x1080@60, 1920x0, 1

# ── Keybinds ─────────────────────────────────────────────────────
# hyprctl dispatch used instead of direct dispatcher — hyprpm loads after config parse
bind = Alt, Tab, exec, hyprctl dispatch hyprexpo:expo toggle
bind = Alt+Shift, Tab, exec, rofi -show window -modi window -window-format "{w} {c} {t}"
bind = Super, P, exec, nwg-displays
bind = Ctrl+Shift, S, exec, flameshot gui
bind = Super+Ctrl, D, exec, qs msg -c caelestia notifs toggleDnd
