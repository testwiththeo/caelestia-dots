# ── Touchpad ─────────────────────────────────────────────────────
$touchpadDisableTyping = true
$touchpadScrollFactor = 0.3

# ── Gesture Fingers ──────────────────────────────────────────────
$workspaceSwipeFingers = 3   # horizontal workspace swipe
$gestureFingers = 4          # special workspace toggle
$gestureFingersMore = 5      # system actions (suspend) — distinct to avoid conflicts

# ── Gesture Sensitivity ──────────────────────────────────────────
$gestureDistance = 300
$gestureCancelRatio = 0.15
$gestureMinSpeed = 5
$gestureDirectionLock = true
$gestureLockThreshold = 10